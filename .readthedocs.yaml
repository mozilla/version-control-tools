version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.9"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv sync --only-group docs --frozen
    - uv run --only-group docs -m sphinx -T -b html -d $READTHEDOCS_OUTPUT/doctrees -D language=en docs $READTHEDOCS_OUTPUT/html
